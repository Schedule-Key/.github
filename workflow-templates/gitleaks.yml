name: Secret Scanning (Gitleaks)

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - development
      - beta
      - dev
      - Beta
      - Development

jobs:
  gitleaks:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | sudo tar xz -C /usr/local/bin gitleaks

      - name: Scan for secrets (PR)
        if: github.event_name == 'pull_request'
        run: gitleaks detect --source . --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" --no-banner -v

      - name: Scan for secrets (push)
        if: github.event_name == 'push'
        run: gitleaks detect --source . --log-opts="-1" --no-banner -v
